<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f1a;
    --game-bg: #1a1a2e;
    --text: #ffffff;
    --text-muted: #8888aa;
    --border: #333355;
    --btn-hover: #222244;
    --btn-border: #444477;
    --btn-bg: #151528;
    --canvas-bg: #0e0e1a;
  }
  body.light-mode {
    --bg: #f5f5f0;
    --game-bg: white;
    --text: #111;
    --text-muted: #888;
    --border: #ddd;
    --btn-hover: #f0f0f0;
    --btn-border: #ccc;
    --btn-bg: white;
    --canvas-bg: #fafaf7;
  }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: background 0.3s, color 0.3s; }
  .game { background: var(--game-bg); border-radius: 16px; padding: 1.5rem; max-width: 440px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.15); text-align: center; border: 1px solid var(--border); transition: all 0.3s; }
  h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
  #scoreboard { display: flex; justify-content: center; gap: 2rem; margin-bottom: 1rem; font-size: 14px; color: var(--text-muted); }
  #scoreboard span { font-weight: 600; color: var(--text); }
  canvas { border-radius: 10px; border: 1.5px solid var(--border); display: block; margin: 0 auto; background: var(--canvas-bg); transition: background 0.3s, border-color 0.3s; }
  #status { font-size: 15px; font-weight: 600; color: var(--text); min-height: 24px; margin: 0.75rem 0 0.5rem; }
  #start-btn { padding: 10px 28px; font-size: 14px; font-weight: 500; border: 1px solid var(--btn-border); border-radius: 8px; background: var(--btn-bg); cursor: pointer; color: var(--text); transition: all 0.2s; }
  #start-btn:hover { background: var(--btn-hover); }
  .controls { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-top: 1.2rem; }
  .ctrl-row { display: flex; gap: 6px; }
  .ctrl-btn { width: 44px; height: 44px; font-size: 18px; border: 1px solid var(--btn-border); border-radius: 8px; background: var(--btn-bg); cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; transition: all 0.2s; }
  .ctrl-btn:active { background: var(--btn-hover); }
  .hint { font-size: 12px; color: var(--text-muted); margin-top: 0.5rem; }
  .back-home { position: fixed; top: 16px; left: 16px; z-index: 999; display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 10px; font-family: system-ui, sans-serif; font-size: 13px; font-weight: 600; color: var(--text-muted); text-decoration: none; box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: all 0.2s; }
  .back-home:hover { background: var(--btn-hover); color: var(--text); border-color: var(--border); transform: translateX(-2px); }
  .back-home .back-icon { font-size: 16px; }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 999;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid #2a2a5a;
    background: rgba(14, 14, 40, 0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fbbf24;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    transition: all 0.35s ease;
    outline: none;
  }
  .theme-toggle:hover {
    transform: scale(1.1) rotate(15deg);
    border-color: #fbbf24;
    box-shadow: 0 4px 24px rgba(251, 191, 36, 0.2);
  }
  body.light-mode .theme-toggle {
    background: rgba(255, 255, 255, 0.9);
    border-color: #d0d5e0;
    color: #7c3aed;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
  }
  body.light-mode .theme-toggle:hover {
    border-color: #7c3aed;
    box-shadow: 0 4px 24px rgba(124, 58, 237, 0.15);
  }
  .theme-toggle .icon { transition: transform 0.35s ease; display: inline-block; }
  .theme-toggle:hover .icon { transform: rotate(20deg); }
</style>
</head>
<body>
<a href="index.html" class="back-home"><span class="back-icon">←</span> Home</a>
<div class="game">
  <h1>Snake</h1>
  <div id="scoreboard">Score: <span id="score">0</span> &nbsp; Best: <span id="best">0</span></div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="status">Press Start to play</div>
  <button id="start-btn" onclick="startGame()">Start</button>

  <div class="controls">
    <div class="ctrl-row"><button class="ctrl-btn" onclick="setDir(0,-1)">▲</button></div>
    <div class="ctrl-row">
      <button class="ctrl-btn" onclick="setDir(-1,0)">◀</button>
      <button class="ctrl-btn" onclick="setDir(0,1)">▼</button>
      <button class="ctrl-btn" onclick="setDir(1,0)">▶</button>
    </div>
  </div>
  <div class="hint">Arrow keys or buttons to move</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const COLS = 20, ROWS = 20, CELL = canvas.width / COLS;
let snake, dir, nextDir, food, score, best = 0, loop, running = false;

function startGame() {
  clearInterval(loop);
  snake = [{x:10, y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  score = 0;
  running = true;
  document.getElementById("score").textContent = 0;
  document.getElementById("status").textContent = "";
  document.getElementById("start-btn").textContent = "Restart";
  placeFood();
  loop = setInterval(tick, 130);
}

function placeFood() {
  let pos;
  do { pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function setDir(x, y) {
  if (!running) return;
  if (x !== 0 && dir.x !== 0) return;
  if (y !== 0 && dir.y !== 0) return;
  nextDir = {x, y};
}

function tick() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x===head.x && s.y===head.y)) {
    clearInterval(loop);
    running = false;
    if (score > best) { best = score; document.getElementById("best").textContent = best; }
    document.getElementById("status").textContent = "Game over! Score: " + score;
    document.getElementById("start-btn").textContent = "Play Again";
    draw();
    return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById("score").textContent = score;
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // grid
  ctx.strokeStyle = document.body.classList.contains("light-mode") ? "#f0efe8" : "#22223a";
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
  }
  for (let j = 0; j <= ROWS; j++) {
    ctx.beginPath(); ctx.moveTo(0,j*CELL); ctx.lineTo(canvas.width,j*CELL); ctx.stroke();
  }

  // food
  ctx.fillStyle = "#e24b4a";
  const fx = food.x*CELL, fy = food.y*CELL, r = CELL/2 - 2;
  ctx.beginPath();
  ctx.arc(fx+CELL/2, fy+CELL/2, r, 0, Math.PI*2);
  ctx.fill();

  // snake
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    ctx.fillStyle = i === 0 ? "#1D9E75" : `hsl(${150 - t*20}, 60%, ${40 + t*15}%)`;
    const pad = i === 0 ? 1 : 2;
    roundRect(ctx, seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, 4);
    ctx.fill();
  });

  // eyes on head
  if (snake.length > 0) {
    const h = snake[0];
    ctx.fillStyle = "white";
    const ex = h.x*CELL + CELL/2, ey = h.y*CELL + CELL/2;
    const o = 4;
    let e1, e2;
    if (dir.x===1)  { e1={x:ex+3,y:ey-o}; e2={x:ex+3,y:ey+o}; }
    else if (dir.x===-1){ e1={x:ex-3,y:ey-o}; e2={x:ex-3,y:ey+o}; }
    else if (dir.y===-1){ e1={x:ex-o,y:ey-3}; e2={x:ex+o,y:ey-3}; }
    else             { e1={x:ex-o,y:ey+3}; e2={x:ex+o,y:ey+3}; }
    ctx.beginPath(); ctx.arc(e1.x,e1.y,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e2.x,e2.y,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = "#111";
    ctx.beginPath(); ctx.arc(e1.x,e1.y,1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(e2.x,e2.y,1,0,Math.PI*2); ctx.fill();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

document.addEventListener("keydown", e => {
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
  if (e.key==="ArrowUp") setDir(0,-1);
  else if (e.key==="ArrowDown") setDir(0,1);
  else if (e.key==="ArrowLeft") setDir(-1,0);
  else if (e.key==="ArrowRight") setDir(1,0);
});

draw();
</script>

<button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
  <span class="icon" id="theme-icon">☀️</span>
</button>
<script>
(function() {
  const toggle = document.getElementById('theme-toggle');
  const icon = document.getElementById('theme-icon');
  
  function updateTheme(isLight) {
    if (isLight) {
      document.body.classList.add('light-mode');
      icon.textContent = '🌙';
    } else {
      document.body.classList.remove('light-mode');
      icon.textContent = '☀️';
    }
    // Instantly redraw canvas-based games if functions exist
    if (typeof draw === 'function') {
      try { draw(); } catch(e) {}
    }
    if (typeof drawNext === 'function') {
      try { drawNext(); } catch(e) {}
    }
  }

  // Load initial theme
  const saved = localStorage.getItem('levelup-theme');
  updateTheme(saved === 'light');

  toggle.addEventListener('click', () => {
    const isLight = !document.body.classList.contains('light-mode');
    updateTheme(isLight);
    localStorage.setItem('levelup-theme', isLight ? 'light' : 'dark');
  });
})();
</script>
</body>
</html>
